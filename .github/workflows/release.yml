name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Check if version bump is needed
        id: bump_check
        run: |
          if uv run cz bump --dry-run > /tmp/cz_output.txt 2>&1; then
            echo "bump_needed=true" >> $GITHUB_OUTPUT
          else
            echo "bump_needed=false" >> $GITHUB_OUTPUT
          fi

      - name: Stop if no version bump is needed
        if: steps.bump_check.outputs.bump_needed != 'true'
        run: |
          echo "No version bump needed. Skipping release."
          exit 0

      - name: Configure git
        if: steps.bump_check.outputs.bump_needed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version and update changelog
        if: steps.bump_check.outputs.bump_needed == 'true'
        run: uv run cz bump --yes

      - name: Push bump commit and tag
        if: steps.bump_check.outputs.bump_needed == 'true'
        run: |
          git push
          git push --tags

      - name: Create GitHub release
        if: steps.bump_check.outputs.bump_needed == 'true'
        run: gh release create $(git describe --tags --abbrev=0) --generate-notes
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}